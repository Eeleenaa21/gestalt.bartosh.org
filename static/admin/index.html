<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <link href="config.yml" type="text/yaml" rel="cms-config" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.14.1/dist/decap-cms.js"></script>
  <script>
    fetch('/')
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const cssLink = doc.querySelector('link[rel="stylesheet"]');
        if (cssLink && cssLink.getAttribute('href')) {
          CMS.registerPreviewStyle(cssLink.getAttribute('href'));
        }
      })
      .catch(err => console.error('Не удалось загрузить стили для превью Decap CMS:', err));
  </script>
</body>
</html>
