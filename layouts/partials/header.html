<div class="banner-section">
  <div class="container">
    <div class="banner">
      {{ $banner := resources.Get "images/banner.jpg" }}
      {{ if $banner }}
      <img class="banner-image" src="{{ $banner.Permalink }}" alt="Гештальт-терапевт Елена Бартош" />
      {{ else }}
        <span style="color: red; background: #fff; padding: 10px; display: block;">
          Ошибка: Файл "assets/images/banner.jpg" не найден!
        </span>
      {{ end }}
      <div class="banner-overlay">
        <p class="banner-role">Гештальт-терапевт</p>
        <h2>Елена Бартош</h2>
      </div>
    </div>
  </div>
</div>

<header class="site-header">
  <div class="container nav-wrap">
    <nav class="site-nav" aria-label="Основное меню">
      {{ range .Site.Menus.main.ByWeight }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
