{{ define "main" }}
  <article class="container single-page">
    <header class="page-heading">
      <h2>{{ .Title }}</h2>
      {{ with .Params.description }}<p class="page-description">{{ . }}</p>{{ end }}
    </header>
    <div class="content-block">
      {{ .Content }}
    </div>
  </article>
{{ end }}
